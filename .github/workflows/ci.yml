name: Continuous Integration
permissions:
  contents: read
on:
  pull_request:
  push:
    branches:
      - master

jobs:
  unit_test_edge:
    name: Unit test with in-memory test service [Edge]
    runs-on: ubuntu-latest-16-cores
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          submodules: recursive
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: "23"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ac396bf1a80af16236baf54bd7330ae21dc6ece5 # v6

      - name: Run unit tests (Java 23)
        env:
          USER: unittest
          USE_DOCKER_SERVICE: false
        run: ./gradlew --no-daemon test -x spotlessCheck -x spotlessApply -x spotlessJava -P edgeDepsTest -PtestJavaVersion=23

      - name: Run independent resource tuner test
        env:
          USER: unittest
          USE_DOCKER_SERVICE: false
        run: ./gradlew --no-daemon temporal-sdk:testResourceIndependent -x spotlessCheck -x spotlessApply -x spotlessJava -P edgeDepsTest -PtestJavaVersion=23

      - name: Run Spring Boot 3 compatibility tests
        env:
          USER: unittest
          USE_DOCKER_SERVICE: false
        run: ./gradlew --no-daemon :temporal-spring-boot-autoconfigure:test -x spotlessCheck -x spotlessApply -x spotlessJava -P edgeDepsTest -P springBoot3Test -PtestJavaVersion=23

      - name: Run Spring Boot 4 compatibility tests
        env:
          USER: unittest
          USE_DOCKER_SERVICE: false
        run: ./gradlew --no-daemon :temporal-spring-boot-autoconfigure:test -x spotlessCheck -x spotlessApply -x spotlessJava -P edgeDepsTest -P springBoot4Test -PtestJavaVersion=23

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: "**/build/test-results/test/TEST-*.xml"

  unit_test_jdk8:
    name: Unit test with docker service [JDK8]
    runs-on: ubuntu-latest-16-cores
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          submodules: recursive
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: |
            11
            23
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ac396bf1a80af16236baf54bd7330ae21dc6ece5 # v6

      - name: Start containerized server and dependencies
        env:
          TEMPORAL_CLI_VERSION: 1.7.0
        run: |
          wget -O temporal_cli.tar.gz https://github.com/temporalio/cli/releases/download/v${TEMPORAL_CLI_VERSION}/temporal_cli_${TEMPORAL_CLI_VERSION}_linux_amd64.tar.gz
          tar -xzf temporal_cli.tar.gz
          chmod +x temporal
          ./temporal server start-dev \
              --headless \
              --port 7233 \
              --http-port 7243 \
              --namespace UnitTest \
              --db-filename temporal.sqlite \
              --sqlite-pragma journal_mode=WAL \
              --sqlite-pragma synchronous=OFF \
              --search-attribute CustomKeywordField=Keyword \
              --search-attribute CustomStringField=Text \
              --search-attribute CustomTextField=Text \
              --search-attribute CustomIntField=Int \
              --search-attribute CustomDatetimeField=Datetime \
              --search-attribute CustomDoubleField=Double \
              --search-attribute CustomBoolField=Bool \
              --dynamic-config-value system.enableActivityEagerExecution=true \
                --dynamic-config-value history.MaxBufferedQueryCount=10000 \
              --dynamic-config-value frontend.workerVersioningDataAPIs=true \
              --dynamic-config-value history.enableRequestIdRefLinks=true \
              --dynamic-config-value frontend.WorkerHeartbeatsEnabled=true \
              --dynamic-config-value frontend.ListWorkersEnabled=true \
              --dynamic-config-value 'component.callbacks.allowedAddresses=[{"Pattern":"localhost:7243","AllowInsecure":true}]' \
              --dynamic-config-value frontend.activityAPIsEnabled=true \
              --dynamic-config-value activity.enableStandalone=true \
              --dynamic-config-value history.enableChasm=true \
              --dynamic-config-value history.enableTransitionHistory=true &
          sleep 10s

      # Can't actually run tests against Java 8 because Mockito 5 requires Java 11+.
      # We therefore have to rely on the fact that the code has been compiled with
      # `-release 8` which guarantees that the code is technically (bytecode + API
      # usage) compatible with Java 8.
      - name: Run unit tests (Java 11)
        env:
          USER: unittest
          TEMPORAL_SERVICE_ADDRESS: localhost:7233
          USE_DOCKER_SERVICE: true
        run: ./gradlew --no-daemon test -x spotlessCheck -x spotlessApply -x spotlessJava -PtestJavaVersion=11

      - name: Run Jackson 3 converter tests (Java 17)
        env:
          USER: unittest
          USE_DOCKER_SERVICE: false
        run: ./gradlew --no-daemon :temporal-sdk:jackson3Tests -x spotlessCheck -x spotlessApply -x spotlessJava -PtestJavaVersion=17

      - name: Run virtual thread tests (Java 21)
        env:
          USER: unittest
          TEMPORAL_SERVICE_ADDRESS: localhost:7233
          USE_DOCKER_SERVICE: true
        run: ./gradlew --no-daemon :temporal-sdk:virtualThreadTests -x spotlessCheck -x spotlessApply -x spotlessJava -PtestJavaVersion=21

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: "**/build/test-results/test/TEST-*.xml"

  unit_test_cloud:
    name: Unit test with cloud
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          submodules: recursive
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: "23"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ac396bf1a80af16236baf54bd7330ae21dc6ece5 # v6

      - name: Run cloud test
        # Only supported in non-fork runs, since secrets are not available in forks. We intentionally
        # are only doing this check on the step instead of the job so we require job passing in CI
        # even for those that can't run this step.
        if: ${{ github.event.pull_request.head.repo.full_name == '' || github.event.pull_request.head.repo.full_name == 'temporalio/sdk-java' }}
        env:
          USER: unittest
          TEMPORAL_CLIENT_CLOUD_NAMESPACE: sdk-ci.a2dd6
          TEMPORAL_CLIENT_CLOUD_API_KEY: ${{ secrets.TEMPORAL_CLIENT_CLOUD_API_KEY }}
          TEMPORAL_CLIENT_CLOUD_API_VERSION: 2024-05-13-00
        run: ./gradlew --no-daemon :temporal-sdk:test --tests '*CloudOperationsClientTest'

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: "**/build/test-results/test/TEST-*.xml"

  code_format:
    name: Code format
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          submodules: recursive
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: "23"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ac396bf1a80af16236baf54bd7330ae21dc6ece5 # v6

      - name: Run copyright and code format checks
        run: ./gradlew --no-daemon spotlessCheck

  javadoc:
    name: Javadoc
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          submodules: recursive
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: "23"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ac396bf1a80af16236baf54bd7330ae21dc6ece5 # v6

      - name: Run javadoc
        run: ./gradlew --no-daemon javadoc

  build_native_images:
    name: Build native test server
    uses: ./.github/workflows/build-native-image.yml
    with:
      ref: ${{ github.event.pull_request.head.sha }}
